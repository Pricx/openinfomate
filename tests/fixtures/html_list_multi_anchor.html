<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sample List (Multi Anchor)</title>
  </head>
  <body>
    <main>
      <ul class="posts">
        <li>
          <a class="sponsor" href="https://example.com/sponsor">Sponsor</a>
          <h2><a class="post-link" href="https://example.com/a">First Post</a></h2>
          <p class="summary">A short summary.</p>
        </li>
        <li>
          <a class="sponsor" href="https://example.com/sponsor2">Sponsor 2</a>
          <h2><a class="post-link" href="/b">Second Post</a></h2>
          <p class="summary">Another summary.</p>
        </li>
      </ul>
    </main>
  </body>
</html>
