services:
  api:
    image: ghcr.io/pricx/openinfomate:latest
    pull_policy: always
    restart: unless-stopped
    command: ["tracker", "api", "serve"]
    # Default: bridge networking (services talk over the Docker network).
    #
    # Only expose the Web Admin/API port to the host to avoid port conflicts.
    # For remote access, change 127.0.0.1 to 0.0.0.0 or put a reverse proxy in front.
    ports:
      - "127.0.0.1:${OPENINFOMATE_API_PORT:-8899}:8080"
    environment:
      OPENINFOMATE_INSTANCE: "${OPENINFOMATE_INSTANCE:-openinfomate}"
      OPENINFOMATE_API_PORT: "${OPENINFOMATE_API_PORT:-8899}"
      OPENINFOMATE_API_BIND_HOST: "127.0.0.1"
      # Localhost-only binding means Web Admin writes are allowed without enabling remote env updates.
      # (Operators can still enable this explicitly if they expose the admin UI.)
      TRACKER_ADMIN_ALLOW_REMOTE_ENV_UPDATE: "false"
      # First-run UX: start without preconfigured password/token (localhost-only port binding above).
      TRACKER_BOOTSTRAP_ALLOW_NO_AUTH: "true"
      TRACKER_API_HOST: "0.0.0.0"
      TRACKER_API_PORT: "8080"
      TRACKER_DB_URL: "sqlite:////data/tracker.db"
      TRACKER_ENV_PATH: "/data/.env"
      # Optional: local meta-search backend (recommended). See `deploy/searxng/` for details.
      TRACKER_SEARXNG_BASE_URL: "${OPENINFOMATE_SEARXNG_BASE_URL:-http://searxng:8080}"
    volumes:
      - openinfomate-data:/data

  scheduler:
    image: ghcr.io/pricx/openinfomate:latest
    pull_policy: always
    restart: unless-stopped
    command: ["tracker", "service", "run"]
    depends_on:
      - api
    environment:
      OPENINFOMATE_INSTANCE: "${OPENINFOMATE_INSTANCE:-openinfomate}"
      OPENINFOMATE_API_PORT: "${OPENINFOMATE_API_PORT:-8899}"
      OPENINFOMATE_API_BIND_HOST: "127.0.0.1"
      TRACKER_ADMIN_ALLOW_REMOTE_ENV_UPDATE: "false"
      TRACKER_BOOTSTRAP_ALLOW_NO_AUTH: "true"
      TRACKER_DB_URL: "sqlite:////data/tracker.db"
      TRACKER_ENV_PATH: "/data/.env"
      TRACKER_SEARXNG_BASE_URL: "${OPENINFOMATE_SEARXNG_BASE_URL:-http://searxng:8080}"
    volumes:
      - openinfomate-data:/data

  # Local meta-search backend (SearxNG).
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./deploy/searxng/settings.yml:/etc/searxng/settings.yml:ro
      - openinfomate-searxng-cache:/var/cache/searxng

volumes:
  openinfomate-data:
  openinfomate-searxng-cache:
